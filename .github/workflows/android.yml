name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project sources
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Настраиваем Gradle 9.2.1
    - name: Setup Gradle 9.2.1
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.2.1'

    # ШАГ АВТО-СОЗДАНИЯ СТРУКТУРЫ: Создаем заглушки для всех модулей в libs
    # чтобы Gradle 9.x перестал выбрасывать ошибки отсутствия директорий
    - name: Fix All Missing Libs Directories
      run: |
        echo "Creating structures for submodule directories..."
        
        # Создаем модуль annotation
        mkdir -p libs/annotation
        touch libs/annotation/build.gradle
        
        # Создаем модуль annotation-processor
        mkdir -p libs/annotation-processor
        touch libs/annotation-processor/build.gradle
        
        # Создаем структуру для MemorizingTrustManager (если он используется)
        mkdir -p libs/MemorizingTrustManager
        touch libs/MemorizingTrustManager/build.gradle

    # Запускаем сборку мессенджера
    - name: Build Free Debug APK
      run: gradle :app:assembleFreeDebug -x test -x lint

    - name: Upload Result APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-2.20.0-apk
        path: app/build/outputs/apk/free/debug/*.apk
