name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Configure Gradle Properties
      run: echo "android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false" >> gradle.properties

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Conversations Free Debug APK
      run: ./gradlew assembleConversationsFreeDebug -x test -x lint

    # Загружаем ЛЮБОЙ APK-файл, который был создан в процессе
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-apk
        path: |
          **/*.apk
          !**/build-cache/**
