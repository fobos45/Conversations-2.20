name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project sources
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Настраиваем Gradle 9.2.1, который требует ваш build.gradle
    - name: Setup Gradle 9.2.1
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.2.1'

    # Исправляем баг структуры: если папки libs/annotation-processor нет, 
    # мы создадим пустую структуру, чтобы Gradle 9.x не ругался на её отсутствие
    - name: Fix Missing Libs Directory
      run: |
        mkdir -p libs/annotation-processor
        touch libs/annotation-processor/build.gradle

    # Запускаем сборку
    - name: Build Free Debug APK
      run: gradle :app:assembleFreeDebug -x test -x lint

    - name: Upload Result APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-2.20.0-apk
        path: app/build/outputs/apk/free/debug/*.apk
