name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Устраняем предупреждения Gradle
    - name: Configure Gradle Properties
      run: echo "android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false" >> gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Сборка конкретной версии Conversations (не Quicksy)
    - name: Build Conversations Free Debug APK
      run: ./gradlew assembleConversationsFreeDebug -x test -x lint

    # Загружаем готовый артефакт
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-free-debug-apk
        path: build/outputs/apk/conversations/free/debug/*.apk
