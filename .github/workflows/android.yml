name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    # Устанавливаем JDK 21, как того требует текущая версия проекта
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Исправляем предупреждение Gradle о библиотеках
    - name: Configure Gradle Properties
      run: echo "android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false" >> gradle.properties

    # Даем права на исполнение скрипту сборки
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Запускаем сборку. 
    # -x test: пропускает тесты (чтобы не упало из-за ошибок в тестах)
    # -x lint: пропускает проверку кода (ускоряет сборку)
    - name: Build Debug APK
      run: ./gradlew assembleDebug -x test -x lint

    # Загружаем готовый APK как артефакт, чтобы его можно было скачать
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-debug-apk
        path: app/build/outputs/apk/debug/*.apk
