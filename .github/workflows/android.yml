name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Исправляем предупреждение Gradle о библиотеках
    - name: Configure Gradle Properties
      run: echo "android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false" >> gradle.properties

    # Даем права на исполнение скрипту сборки
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Сборка именно free-версии (без Google Services)
    - name: Build Free Debug APK
      run: ./gradlew assembleFreeDebug -x test -x lint

    # Загружаем готовый APK как артефакт
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: conversations-free-debug-apk
        path: app/build/outputs/apk/free/debug/*.apk
